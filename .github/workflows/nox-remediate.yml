name: Nox Remediate

# Replaces dependabot. Runs nox scan + nox fix on a weekly cadence and
# opens a single PR with vulnerability-driven dependency upgrades.
# Manual trigger available for ad-hoc remediation passes.

on:
  schedule:
    - cron: "0 6 * * 1" # Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      include_major:
        description: "Include major-version upgrades"
        required: false
        default: "false"

permissions:
  contents: write
  pull-requests: write

env:
  NOX_VERSION: "0.9.5"

jobs:
  remediate:
    name: Remediate (nox fix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.25"

      - name: Install nox
        run: |
          set -euo pipefail
          ASSET="nox_${NOX_VERSION}_linux_amd64.tar.gz"
          curl -fsSL "https://github.com/nox-hq/nox/releases/download/v${NOX_VERSION}/${ASSET}" -o "${ASSET}"
          curl -fsSL "https://github.com/nox-hq/nox/releases/download/v${NOX_VERSION}/checksums.txt" -o nox.sums
          grep " ${ASSET}\$" nox.sums | sha256sum -c -
          tar -xzf "${ASSET}" nox
          sudo mv nox /usr/local/bin/nox
          nox version

      - name: Scan
        run: nox scan -format json -output . . || true

      - name: Apply fixes
        id: fix
        run: |
          set -euo pipefail
          ARGS=()
          if [ "${{ github.event.inputs.include_major }}" = "true" ]; then
            ARGS+=("-include-major")
          fi
          # Capture dry-run output for PR body, then apply.
          nox fix -dry-run -input findings.json "${ARGS[@]}" > nox-fix-plan.txt 2>&1 || true
          nox fix -input findings.json "${ARGS[@]}" || true

      - name: Verify build still passes
        run: |
          go mod tidy
          go build ./...
          go test -short ./...

      - name: Refresh badge
        run: nox badge -input findings.json -output docs/nox-badge.svg || true

      - name: Open remediation PR
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/nox-remediate
          delete-branch: true
          title: "chore(security): nox-driven dependency remediation"
          commit-message: |
            chore(security): apply nox remediation

            Auto-generated by nox-remediate workflow. Dependency upgrades
            target known vulnerabilities surfaced by `nox scan` (OSV.dev).
          body: |
            ## Automated security remediation

            This PR was created by the **Nox Remediate** workflow, which
            replaces Dependabot for vulnerability-driven dependency
            upgrades. Each upgrade is keyed off a real OSV finding rather
            than a version-bump heuristic.

            ### Fix plan
            ```
            $(cat nox-fix-plan.txt 2>/dev/null || echo "(empty)")
            ```

            ### Verification
            - `go mod tidy`
            - `go build ./...`
            - `go test -short ./...`

            All ran green inside the workflow before this PR was opened.
          labels: |
            security
            dependencies
            automated