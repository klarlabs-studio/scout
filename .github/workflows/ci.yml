name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install Chrome (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable || sudo apt-get install -y chromium-browser

      - name: Unit tests
        run: go test -short -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Integration tests
        if: runner.os == 'Linux'
        # 74 integration tests each spin up Chrome; suite runs ~150s
        # locally with cache and ~5min on CI under -race. 120s was wildly
        # under-budget — earlier "hangs" were just the alarm firing on
        # a healthy test that hadn't reached the queue yet.
        run: go test -race -timeout 600s -run TestIntegration ./...


  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.25"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v6.5.0
        with:
          version: latest
          args: . ./cmd/... ./middleware/... ./internal/...

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.25"

      - run: go vet ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.25"

      - run: go build ./...

  security:
    name: Security (nox)
    runs-on: ubuntu-latest
    permissions:
      contents: write # to commit refreshed badge on main
      pull-requests: write # to annotate PRs
      security-events: write # to upload SARIF
    env:
      NOX_VERSION: "0.9.5"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install nox
        run: |
          set -euo pipefail
          ASSET="nox_${NOX_VERSION}_linux_amd64.tar.gz"
          curl -fsSL "https://github.com/nox-hq/nox/releases/download/v${NOX_VERSION}/${ASSET}" -o "${ASSET}"
          curl -fsSL "https://github.com/nox-hq/nox/releases/download/v${NOX_VERSION}/checksums.txt" -o nox.sums
          grep " ${ASSET}\$" nox.sums | sha256sum -c -
          tar -xzf "${ASSET}" nox
          sudo mv nox /usr/local/bin/nox
          nox version

      - name: Scan (SARIF + JSON)
        run: |
          nox scan -format json,sarif -output . -severity-threshold high . || true
          test -f findings.json
          test -f findings.sarif

      - name: Enforce baseline
        run: |
          # Fail if there are unwaived findings outside the committed baseline.
          # Baseline lives at .nox/baseline.json — see baseline-status step output.
          nox scan -severity-threshold high .

      - name: Annotate PR with findings
        if: github.event_name == 'pull_request'
        run: nox annotate -input findings.json || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF to GitHub code scanning
        if: hashFiles('findings.sarif') != ''
        uses: github/codeql-action/upload-sarif@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
        with:
          sarif_file: findings.sarif

      - name: Refresh status badge
        run: nox badge -input findings.json -output docs/nox-badge.svg

      - name: Commit refreshed badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet docs/nox-badge.svg; then
            echo "Badge unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/nox-badge.svg
          git commit -m "chore(security): refresh nox badge [skip ci]"
          git push
