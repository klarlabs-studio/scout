# Thin caller for the shared klarlabs-studio Go CI bar.
# All gate logic (fmt, golangci-lint w/ gocritic, race tests, nox security
# scan + SARIF + baseline gate) lives in the reusable workflow — bump
# versions / add jobs there, once, org-wide.
#
# Chrome integration tests are intentionally NOT here: they need a browser
# and run ~5min, so they live in a dedicated workflow (integration.yml) and
# are excluded from the unit run via the `integration` build tag.
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: klarlabs-studio/.github/.github/workflows/go-ci.yml@main
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    secrets: inherit
    with:
      # No coverage threshold defined yet (audit gap). Keep the gate off
      # until a baseline is set, then flip to true.
      # TODO(coverage): add a coverctl threshold and set coverage: true.
      coverage: false
      # Scout has OS-specific browser/launcher behavior — validate the unit
      # suite on macOS + Windows on push-to-main.
      cross-platform: true
