version: 2

project_name: scout

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/scout
    binary: scout
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

dockers:
  - image_templates:
      - "ghcr.io/klarlabs-studio/scout:{{ .Version }}-amd64"
    use: buildx
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/klarlabs-studio/scout"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=io.modelcontextprotocol.server.name=io.github.klarlabs-studio/scout"
    dockerfile: Dockerfile
    goos: linux
    goarch: amd64

  - image_templates:
      - "ghcr.io/klarlabs-studio/scout:{{ .Version }}-arm64"
    use: buildx
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/klarlabs-studio/scout"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=io.modelcontextprotocol.server.name=io.github.klarlabs-studio/scout"
    dockerfile: Dockerfile
    goos: linux
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/klarlabs-studio/scout:{{ .Version }}"
    image_templates:
      - "ghcr.io/klarlabs-studio/scout:{{ .Version }}-amd64"
      - "ghcr.io/klarlabs-studio/scout:{{ .Version }}-arm64"

  - name_template: "ghcr.io/klarlabs-studio/scout:latest"
    image_templates:
      - "ghcr.io/klarlabs-studio/scout:{{ .Version }}-amd64"
      - "ghcr.io/klarlabs-studio/scout:{{ .Version }}-arm64"

brews:
  - repository:
      owner: klarlabs-studio
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/klarlabs-studio/scout"
    description: "MCP server for AI-powered browser automation"
    license: "MIT"
    install: |
      bin.install "scout"
    test: |
      assert_match version.to_s, shell_output("#{bin}/scout --version")
