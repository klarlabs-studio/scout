# golangci-lint v2 config — klarlabs-studio Go bar (gocritic) merged with
# scout's repo-specific extras (bodyclose, nilerr). Keep gocritic enabled:
# it is the org engineering bar, not opt-in. Code-level security is owned by
# nox (taint-analysis plugin + core ruleset), not gosec.
version: "2"

run:
  timeout: 5m
  # Test files are exercised by the unit + integration suites, not linted.
  tests: false

linters:
  default: standard
  enable:
    # --- org mandatory bar ---
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - gocritic     # org engineering bar — do not drop
    # --- scout repo-specific ---
    - bodyclose
    - nilerr
  settings:
    errcheck:
      check-type-assertions: true
    govet:
      disable:
        - fieldalignment
        - shadow
  exclusions:
    paths:
      # Illustrative, intentionally terse demo programs (unchecked demo
      # errors, os.Exit in main). Not part of the shipped library/CLI
      # surface; scout's prior lint scope already excluded them.
      - examples/

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
